<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure HTML - 3D Cube Example</title>
    <link rel="stylesheet" href="../../../../css/base.css">
    <link rel="stylesheet" href="../../../../css/ui-components.css">
    <script src="../../../../js/elm-animate-waapi.js"></script>
    <script src="index.js"></script>
</head>

<body>
    <div id="elm"></div>
    <script>
        var app = Elm.Engines.WAAPI.Animate3D.Main.init({
            node: document.getElementById('elm'),
            flags: { window: { width: window.innerWidth } }
        });

        ElmAnimateWAAPI.init(app.ports);
    </script>
</body>

</html>
