<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAAPI Engine - Controlling Animations Example</title>
    <link rel="stylesheet" href="../../../../css/base.css?v=1.0.0">
    <link rel="stylesheet" href="../../../../css/ui-components.css?v=1.0.0">
    <script src="../../../../js/elm-animate-waapi.js"></script>
    <script src="index.js"></script>
</head>

<body>
    <div id="elm-app"></div>
    <script>
        const app = Elm.Engines.WAAPI.ControllingAnimations.Main.init({
            node: document.getElementById('elm-app'),
            flags: {
                window: {
                    width: window.innerWidth
                }
            }
        });

        ElmAnimateWAAPI.init(app.ports);
    </script>
</body>

</html>
