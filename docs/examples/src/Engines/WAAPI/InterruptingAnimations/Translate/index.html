<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAAPI Engine Interrupting Animations - Elm Animate</title>
    <script src="../../../../../js/elm-animate-waapi.js"></script>
    <script src="index.js"></script>
</head>

<body>
    <div id="elm"></div>
    <script>
        var app = Elm.Engines.WAAPI.InterruptingAnimations.Translate.Main.init({
            flags: { width: window.innerWidth, height: window.innerHeight },
            node: document.getElementById('elm')
        });

        ElmAnimateWAAPI.init(app.ports);
    </script>
</body>

</html>
