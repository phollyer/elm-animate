<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAAPI Engine Controls Example - Elm Animate</title>
    <link rel="stylesheet" href="../../../../css/base.css">
    <link rel="stylesheet" href="../../../../css/ui-components.css">
    <script src="../../../../js/elm-animate-waapi.js"></script>
    <script src="index.js"></script>
</head>

<body>
    <div id="elm-app"></div>
    <script>
        const app = Elm.Concepts.ControllingAnimations.WaapiEngine.Main.init({
            node: document.getElementById('elm-app'),
            flags: {
                window: {
                    width: window.innerWidth,
                    height: window.innerHeight
                }
            }
        });

        // Initialize WAAPI JavaScript integration
        window.ElmAnimateWAAPI.init(app.ports);
    </script>
</body>

</html>
