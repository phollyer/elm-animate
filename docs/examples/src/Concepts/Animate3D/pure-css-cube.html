<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cube Animation - Pure CSS/JS</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .animation-area {
            width: 500px;
            height: 350px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .perspective-container {
            perspective: 1000px;
            perspective-origin: left center;
        }

        .cube {
            width: 100px;
            height: 100px;
            position: relative;
            transform-style: preserve-3d;
            /* Initial position: translateZ(200px) */
            transform: translateZ(200px) rotateY(0deg);
        }

        .face {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            color: white;
            backface-visibility: visible;
        }

        /* Face colors and initial positions */
        .front {
            background: rgb(52, 152, 219);
            border-color: rgb(41, 128, 185);
            /* translateZ(50px) - depth */
            transform: translateZ(50px);
        }

        .back {
            background: rgb(41, 128, 185);
            border-color: rgb(33, 97, 140);
            /* rotateY(180deg) translateZ(-50px) */
            transform: rotateY(180deg) translateZ(-50px);
        }

        .right {
            background: rgb(231, 76, 60);
            border-color: rgb(192, 57, 43);
            /* rotateY(90deg) translateX(50px) */
            transform: rotateY(90deg) translateX(50px);
        }

        .left {
            background: rgb(230, 126, 34);
            border-color: rgb(211, 84, 0);
            /* rotateY(-90deg) translateX(-50px) */
            transform: rotateY(-90deg) translateX(-50px);
        }

        .top {
            background: rgb(46, 204, 113);
            border-color: rgb(39, 174, 96);
            /* rotateX(90deg) translateY(-50px) */
            transform: rotateX(90deg) translateY(-50px);
        }

        .bottom {
            background: rgb(155, 89, 182);
            border-color: rgb(142, 68, 173);
            /* rotateX(-90deg) translateY(50px) */
            transform: rotateX(-90deg) translateY(50px);
        }

        /* Animation classes */
        .cube.rotate-clockwise {
            animation: rotateCubeClockwise 8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        .cube.rotate-counterclockwise {
            animation: rotateCubeCounterClockwise 8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        @keyframes rotateCubeClockwise {
            from {
                transform: translateZ(200px) rotateY(0deg);
            }

            to {
                transform: translateZ(200px) rotateY(360deg);
            }
        }

        @keyframes rotateCubeCounterClockwise {
            from {
                transform: translateZ(200px) rotateY(360deg);
            }

            to {
                transform: translateZ(200px) rotateY(0deg);
            }
        }

        /* Face expand animations - bounce easing approximation */
        .front.expand {
            animation: frontExpand 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .front.collapse {
            animation: frontCollapse 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .back.expand {
            animation: backExpand 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .back.collapse {
            animation: backCollapse 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .right.expand {
            animation: rightExpand 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .right.collapse {
            animation: rightCollapse 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .left.expand {
            animation: leftExpand 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .left.collapse {
            animation: leftCollapse 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .top.expand {
            animation: topExpand 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .top.collapse {
            animation: topCollapse 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .bottom.expand {
            animation: bottomExpand 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .bottom.collapse {
            animation: bottomCollapse 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* Keyframes for face expansion (depth=50, moveAmount=50, so expanded=100) */
        @keyframes frontExpand {
            from {
                transform: translateZ(50px);
            }

            to {
                transform: translateZ(100px);
            }
        }

        @keyframes frontCollapse {
            from {
                transform: translateZ(100px);
            }

            to {
                transform: translateZ(50px);
            }
        }

        @keyframes backExpand {
            from {
                transform: rotateY(180deg) translateZ(-50px);
            }

            to {
                transform: rotateY(180deg) translateZ(-100px);
            }
        }

        @keyframes backCollapse {
            from {
                transform: rotateY(180deg) translateZ(-100px);
            }

            to {
                transform: rotateY(180deg) translateZ(-50px);
            }
        }

        @keyframes rightExpand {
            from {
                transform: rotateY(90deg) translateX(50px);
            }

            to {
                transform: rotateY(90deg) translateX(100px);
            }
        }

        @keyframes rightCollapse {
            from {
                transform: rotateY(90deg) translateX(100px);
            }

            to {
                transform: rotateY(90deg) translateX(50px);
            }
        }

        @keyframes leftExpand {
            from {
                transform: rotateY(-90deg) translateX(-50px);
            }

            to {
                transform: rotateY(-90deg) translateX(-100px);
            }
        }

        @keyframes leftCollapse {
            from {
                transform: rotateY(-90deg) translateX(-100px);
            }

            to {
                transform: rotateY(-90deg) translateX(-50px);
            }
        }

        @keyframes topExpand {
            from {
                transform: rotateX(90deg) translateY(-50px);
            }

            to {
                transform: rotateX(90deg) translateY(-100px);
            }
        }

        @keyframes topCollapse {
            from {
                transform: rotateX(90deg) translateY(-100px);
            }

            to {
                transform: rotateX(90deg) translateY(-50px);
            }
        }

        @keyframes bottomExpand {
            from {
                transform: rotateX(-90deg) translateY(50px);
            }

            to {
                transform: rotateX(-90deg) translateY(100px);
            }
        }

        @keyframes bottomCollapse {
            from {
                transform: rotateX(-90deg) translateY(100px);
            }

            to {
                transform: rotateX(-90deg) translateY(50px);
            }
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #3498db;
            color: white;
        }

        button:hover {
            background: #2980b9;
        }

        .status {
            margin-top: 15px;
            padding: 10px 20px;
            background: #ecf0f1;
            border-radius: 6px;
            font-size: 14px;
        }

        .explanation {
            max-width: 700px;
            margin-top: 20px;
            padding: 20px;
            background: rgb(242, 247, 255);
            border-radius: 8px;
            font-size: 14px;
        }

        .explanation h2 {
            font-size: 16px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <h1>3D Cube Animation - Pure CSS/JS</h1>

    <div class="animation-area">
        <div class="perspective-container">
            <div class="cube" id="cube">
                <div class="face front" id="front">FRONT</div>
                <div class="face back" id="back">BACK</div>
                <div class="face right" id="right">RIGHT</div>
                <div class="face left" id="left">LEFT</div>
                <div class="face top" id="top">TOP</div>
                <div class="face bottom" id="bottom">BOTTOM</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="startAnimation()">Start Animation Cycle</button>
        <button onclick="stopAnimation()">Stop</button>
    </div>

    <div class="status" id="status">Status: Idle</div>

    <div class="explanation">
        <h2>3D Cube Animation</h2>
        <p>This example demonstrates a 3D cube built with six positioned faces
            that cycles through: expand sides → rotate → close sides → rotate back.</p>
    </div>

    <script>
        const cube = document.getElementById('cube');
        const faces = ['front', 'back', 'right', 'left', 'top', 'bottom'];
        const statusEl = document.getElementById('status');

        let currentState = 'idle';
        let animationRunning = false;

        function setStatus(text) {
            statusEl.textContent = 'Status: ' + text;
            console.log('State:', text);
        }

        function clearFaceAnimations() {
            faces.forEach(face => {
                const el = document.getElementById(face);
                el.classList.remove('expand', 'collapse');
            });
        }

        function clearCubeAnimation() {
            cube.classList.remove('rotate-clockwise', 'rotate-counterclockwise');
        }

        function expandSides() {
            setStatus('Expanding sides...');
            currentState = 'expanding';
            clearFaceAnimations();

            // Force reflow to restart animations
            void cube.offsetWidth;

            faces.forEach(face => {
                document.getElementById(face).classList.add('expand');
            });
        }

        function collapseSides() {
            setStatus('Collapsing sides...');
            currentState = 'collapsing';
            clearFaceAnimations();

            void cube.offsetWidth;

            faces.forEach(face => {
                document.getElementById(face).classList.add('collapse');
            });
        }

        function rotateClockwise() {
            setStatus('Rotating clockwise...');
            currentState = 'rotating-clockwise';
            clearCubeAnimation();

            void cube.offsetWidth;

            cube.classList.add('rotate-clockwise');
        }

        function rotateCounterClockwise() {
            setStatus('Rotating counter-clockwise...');
            currentState = 'rotating-counterclockwise';
            clearCubeAnimation();

            void cube.offsetWidth;

            cube.classList.add('rotate-counterclockwise');
        }

        // Listen for animation end events
        document.getElementById('front').addEventListener('animationend', (e) => {
            if (!animationRunning) return;

            if (currentState === 'expanding') {
                rotateClockwise();
            } else if (currentState === 'collapsing') {
                rotateCounterClockwise();
            }
        });

        cube.addEventListener('animationend', (e) => {
            if (!animationRunning) return;

            if (currentState === 'rotating-clockwise') {
                collapseSides();
            } else if (currentState === 'rotating-counterclockwise') {
                // Restart the cycle
                expandSides();
            }
        });

        function startAnimation() {
            animationRunning = true;
            clearFaceAnimations();
            clearCubeAnimation();

            // Reset cube transform
            cube.style.transform = 'translateZ(200px) rotateY(0deg)';

            // Reset face transforms
            document.getElementById('front').style.transform = 'translateZ(50px)';
            document.getElementById('back').style.transform = 'rotateY(180deg) translateZ(-50px)';
            document.getElementById('right').style.transform = 'rotateY(90deg) translateX(50px)';
            document.getElementById('left').style.transform = 'rotateY(-90deg) translateX(-50px)';
            document.getElementById('top').style.transform = 'rotateX(90deg) translateY(-50px)';
            document.getElementById('bottom').style.transform = 'rotateX(-90deg) translateY(50px)';

            setTimeout(() => {
                expandSides();
            }, 100);
        }

        function stopAnimation() {
            animationRunning = false;
            clearFaceAnimations();
            clearCubeAnimation();
            setStatus('Stopped');
            currentState = 'idle';
        }
    </script>
</body>

</html>
