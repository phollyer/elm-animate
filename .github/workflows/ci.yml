name: CI

on:
  push:
    branches:
      - main
      - Refactoring-Property-Baseline
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_js_companion:
    name: Build JS Companion
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: npm ci

      - name: Build JS companion
        run: npm run build

  run_tests:
    name: Run Elm and JS Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: npm ci

      - name: Run Elm tests
        run: npm run test:elm

      - name: Run JS tests
        run: npm run test:js

  validate_docs_examples:
    name: Validate Documentation Examples
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: npm ci

      - name: Build documentation examples
        run: npm run build:docs