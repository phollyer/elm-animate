name: CI

on:
  push:
    branches:
      - main
      - Refactoring-Property-Baseline
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Setup Elm and elm-test
        run: npm install -g elm@0.19.1-6 elm-test@0.19.1-revision17 elm-format@0.8.8

      - name: Install JS dependencies
        run: npm ci

      - name: Build JS companion
        run: npm run build

      - name: Run Elm tests
        run: elm-test

      - name: Run JS tests
        run: npm run test:js

      - name: Build documentation examples
        run: |
          chmod +x scripts/build-docs-examples.sh
          yes n | ./scripts/build-docs-examples.sh || ./scripts/build-docs-examples.sh