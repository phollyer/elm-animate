name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'examples/src/Docs/**'
      - 'src/**'
      - 'dist/**'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      
      - name: Setup Elm
        run: npm install -g elm@0.19.1-6 elm-format@0.8.8
      
      - name: Install npm dependencies
        run: npm ci
      
      - name: Build JS companion (dist/)
        run: npm run build
      
      - name: Build documentation examples
        run: |
          chmod +x scripts/build-docs-examples.sh
          # Run non-interactively (skip mkdocs install prompt)
          yes n | ./scripts/build-docs-examples.sh || ./scripts/build-docs-examples.sh
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install MkDocs Dependencies
        run: pip install -r docs/requirements-docs.txt
      
      - name: Build and deploy
        run: mkdocs gh-deploy --force
