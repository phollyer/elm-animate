<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElmUI - Anim.Engine.CSS Choreography Example</title>
    <link rel="stylesheet" href="../../../../../css/base.css">
    <link rel="stylesheet" href="../../../../../css/ui-components.css">
</head>

<body>
    <div id="elm"></div>
    <script src="../../../../../dist/elm-animate-waapi.js"></script>
    <script src="index.js"></script>
    <script>
        var app = Elm.ElmUI.WAAPI.Choreography.Main.init({
            node: document.getElementById('elm'), flags: {
                window: {
                    width: window.innerWidth,
                    height: window.innerHeight
                }
            }
        });

        // Initialize ElmAnimateWAAPI with the Elm app's ports
        ElmAnimateWAAPI.init(app.ports);
    </script>
</body>

</html>
