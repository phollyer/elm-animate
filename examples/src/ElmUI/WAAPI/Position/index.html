<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElmUI - Anim.Engine.WAAPI Position Example</title>
    <link rel="stylesheet" href="../../../../../css/base.css">
    <link rel="stylesheet" href="../../../../../css/ui-components.css">
    <style>
        /* Additional page-specific styles can go here */
    </style>
</head>

<body>
    <div id="elm"></div>
    <script src="../../../../../dist/elm-animate-waapi.js"></script>
    <script src="index.js"></script>
    <script>
        var app = Elm.ElmUI.WAAPI.Position.Main.init({
            node: document.getElementById('elm')
        });

        // Initialize ElmAnimateWAAPI with the Elm app's ports
        ElmAnimateWAAPI.init(app.ports);
    </script>
</body>

</html>
