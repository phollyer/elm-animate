<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Engine - Basic Example</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        /* Remove default scrollbar styling for better visual control */
        html {
            scroll-behavior: auto;
            /* Disable native smooth scroll since we're handling it */
        }
    </style>
</head>

<body>
    <script src="index.js"></script>
    <script>
        // Initialize the Elm application
        var app = Elm.ElmUI.ScrollEngine.Basic.Main.init({
            node: document.body
        });
    </script>
</body>

</html>
