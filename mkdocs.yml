site_name: Elm Animate
site_description: A comprehensive Elm package for smooth, high-performance DOM animations and scrolling
site_url: https://phollyer.github.io/elm-animate/
repo_url: https://github.com/phollyer/elm-animate
repo_name: phollyer/elm-animate

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

hooks:
  - docs/hooks.py

# Exclude example source files from MkDocs processing.
# They are standalone HTML/JS files copied to the site by hooks.py.
# Without this, mkdocs serve intercepts requests to these files
# and wraps them in the MkDocs template, breaking iframe embeds.
exclude_docs: |
  examples/src/
  examples/css/
  examples/js/
  examples/elm-stuff/
  examples/elm.json

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: .
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Philosophy: philosophy.md
  - Installation: installation.md
  - Animation:
    - Start Here: animation/first-animations.md
    - Workflow:
      - 1. Build: animation/workflow/build.md
      - 2. Initialize: animation/workflow/init.md
      - 3. Render: animation/workflow/render.md
      - 4. Trigger: animation/workflow/trigger.md
      - 5. React: animation/workflow/react.md
    - Engines:
      - Overview: animation/engines/overview.md
      - Transition Engine: animation/engines/transitions.md
      - Keyframe Engine: animation/engines/keyframes.md
      - Sub Engine: animation/engines/sub.md
      - WAAPI Engine: animation/engines/waapi.md
      - Migration Guide: animation/engines/migration-guide.md
    - Properties:
      - Getting Started: animation/properties/getting-started.md
      - Overview: animation/properties/overview.md
      - GPU Accelerated:
        - Overview: animation/properties/gpu.md
        - Opacity: animation/properties/opacity.md
        - Rotate: animation/properties/rotate.md
        - Scale: animation/properties/scale.md
        - Translate: animation/properties/translate.md
      - Non-GPU:
        - Overview: animation/properties/non-gpu.md
        - Background Color: animation/properties/background-color.md
        - Font Color: animation/properties/font-color.md
        - Size: animation/properties/size.md
      - Custom:
        - Custom Property: animation/properties/custom-property.md
        - Custom Color Property: animation/properties/custom-color-property.md
      - Discrete Properties: animation/concepts/discrete-properties.md
    - Concepts:
      - Interrupting Animations: animation/concepts/interrupting-animations.md
      - Controlling Animations: animation/concepts/controlling-animations.md
      - Timing: animation/concepts/timing.md
      - Easing: animation/concepts/easing.md
      - Transform Order: animation/concepts/transform-order.md
      - 3D Animations: animation/concepts/3d.md
    - Examples: animation/examples.md
  - Scroll:
    - Start Here: scroll/first-scrolls.md
    - Workflow:
      - 1. Build: scroll/workflow/build.md
      - 2. Trigger: scroll/workflow/trigger.md
      - 3. React: scroll/workflow/react.md
    - Engines:
      - Overview: scroll/engines/overview.md
      - Cmd Engine: scroll/engines/cmd.md
      - Task Engine: scroll/engines/task.md
      - Sub Engine: scroll/engines/sub.md
    - Concepts:
      - Interrupting Scrolls: scroll/concepts/interrupting-scrolls.md
      - Controlling Scroll: scroll/concepts/controlling-scroll.md
      - Timing: scroll/concepts/timing.md
      - Easing: scroll/concepts/easing.md
    - Examples: scroll/examples.md
  - API Reference: api-reference.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/phollyer/elm-animate

extra_javascript:
  - js/iframe-reload.js

extra_css:
  - css/iframe-reload.css
