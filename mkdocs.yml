site_name: Elm Animate
site_description: A comprehensive Elm package for smooth, high-performance DOM animations and scrolling
site_url: https://phollyer.github.io/elm-animate/
repo_url: https://github.com/phollyer/elm-animate
repo_name: phollyer/elm-animate

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

hooks:
  - docs/hooks.py

# Exclude example source files from MkDocs processing.
# They are standalone HTML/JS files copied to the site by hooks.py.
# Without this, mkdocs serve intercepts requests to these files
# and wraps them in the MkDocs template, breaking iframe embeds.
exclude_docs: |
  examples/src/
  examples/css/
  examples/js/
  examples/elm-stuff/
  examples/elm.json

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: .
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Philosophy: philosophy.md
  - Installation: getting-started/installation.md
  - Animation:
    - Start Here: getting-started/first-animations.md
    - Workflow:
      - 1. Build: animation-workflow/build.md
      - 2. Initialize: animation-workflow/init.md
      - 3. Render: animation-workflow/render.md
      - 4. Trigger: animation-workflow/trigger.md
      - 5. React: animation-workflow/react.md
    - Engines:
      - Overview: engines/animation/overview.md
      - Transition Engine: engines/animation/transitions.md
      - Keyframe Engine: engines/animation/keyframes.md
      - Sub Engine: engines/animation/sub.md
      - WAAPI Engine: engines/animation/waapi.md
      - Migration Guide: engines/animation/migration-guide.md
    - Properties:
      - Getting Started: getting-started/properties.md
      - Overview: properties/overview.md
      - GPU Accelerated:
        - Overview: properties/gpu.md
        - Opacity: properties/opacity.md
        - Rotate: properties/rotate.md
        - Scale: properties/scale.md
        - Translate: properties/translate.md
      - Non-GPU:
        - Overview: properties/non-gpu.md
        - Background Color: properties/background-color.md
        - Font Color: properties/font-color.md
        - Size: properties/size.md
      - Custom:
        - Custom Property: properties/custom-property.md
        - Custom Color Property: properties/custom-color-property.md
      - Discrete Properties: concepts/discrete-properties.md
    - Concepts:
      - Interrupting Animations: concepts/interrupting-animations.md
      - Controlling Animations: concepts/controlling-animations.md
      - Timing: getting-started/animation-timing.md
      - Easing: getting-started/animation-easing.md
      - Transform Order: concepts/transform-order.md
      - 3D Animations: concepts/3d.md
    - Examples: animation-examples.md
  - Scroll:
    - Start Here: getting-started/first-scrolls.md
    - Workflow:
      - 1. Build: scroll-workflow/build.md
      - 2. Trigger: scroll-workflow/trigger.md
      - 3. React: scroll-workflow/react.md
    - Engines:
      - Overview: engines/scroll/overview.md
      - Cmd Engine: engines/scroll/cmd.md
      - Task Engine: engines/scroll/task.md
      - Sub Engine: engines/scroll/sub.md
    - Concepts:
      - Interrupting Scrolls: concepts/interrupting-scrolls.md
      - Controlling Scroll: concepts/controlling-scroll.md
      - Timing: getting-started/scroll-timing.md
      - Easing: getting-started/scroll-easing.md
    - Examples: scroll-examples.md
  - API Reference: api-reference.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/phollyer/elm-animate

extra_javascript:
  - js/iframe-reload.js

extra_css:
  - css/iframe-reload.css
