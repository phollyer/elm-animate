site_name: Elm Animate
site_description: A comprehensive Elm package for smooth, high-performance DOM animations and scrolling
site_url: https://phollyer.github.io/elm-animate/
repo_url: https://github.com/phollyer/elm-animate
repo_name: phollyer/elm-animate

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

hooks:
  - docs/hooks.py

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: .
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Philosophy: philosophy.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Your First Animation: getting-started/first-animation.md
    - Your First Scroll: getting-started/first-scroll.md
  - Animation Workflow:
    - 1. Build: animation-workflow/build.md
    - 2. Trigger: animation-workflow/trigger.md
    - 3. Apply: animation-workflow/apply.md
  - Concepts:
    - Controlling Animations: concepts/controlling-animations.md
    - Controlling Scroll: concepts/controlling-animations/scroll.md
    - Events: concepts/events.md
    - Properties: concepts/properties.md
    - Timing: concepts/timing.md
    - Easing Functions: concepts/easing.md
    - Sequencing: concepts/sequencing.md
    - Interruptions: concepts/interruptions.md
    - 3D Animations: concepts/3d.md
  - Engines:
    - Overview: engines/overview.md
    - Transitions Engine: engines/transitions.md
    - Keyframes Engine: engines/keyframes.md
    - Sub Engine: engines/sub.md
    - WAAPI Engine: engines/waapi.md
    - Scroll Engine: engines/scroll.md
  - Properties:
    - GPU Accelerated:
      - Opacity: properties/opacity.md
      - Rotate: properties/rotate.md
      - Scale: properties/scale.md
      - Translate: properties/translate.md
    - Non-GPU:
      - Background Color: properties/background-color.md
      - Font Color: properties/font-color.md
      - Size: properties/size.md
  - Examples: examples.md
  - API Reference: api-reference.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/phollyer/elm-animate
